# cronwatch example configuration

webhook_url: "https://hooks.example.com/services/XXXXX"
check_interval: 60          # seconds between checks
report_interval: 3600       # seconds between summary reports

# Retention settings
retention:
  max_age_seconds: 604800   # keep run history for 7 days
  prune_interval: 3600      # run the pruner at most once per hour

jobs:
  - name: daily_backup
    schedule: "0 2 * * *"   # cron expression (informational)
    max_runtime: 1800        # alert if running longer than 30 min
    missed_after: 90000      # alert if not seen within 25 h

  - name: hourly_sync
    schedule: "0 * * * *"
    max_runtime: 300
    missed_after: 4500

  - name: weekly_report
    schedule: "0 8 * * 1"
    max_runtime: 600
    missed_after: 612000     # ~7 days + buffer

  - name: health_ping
    schedule: "*/5 * * * *"
    max_runtime: 30
    missed_after: 600
